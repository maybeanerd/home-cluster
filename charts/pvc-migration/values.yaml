---
# Set to false to disable the chart after migration is complete
enabled: true

# List of PVC migrations to perform
migrations: []
  # - sourcePvc: serviceToMigrate-data
  #   destPvc: serviceToMigrate-data-longhorn
  #   size: 1Gi
  #   storageClass: longhorn # optional
  #   accessMode: ReadWriteOnce  # optional

# Defaults applied to each migration when not specified
defaults:
  storageClass: longhorn
  accessMode: ReadWriteOnce

# Job configuration
job:
  image: alpine:3.19
  ttlSecondsAfterFinished: 86400 # Cleanup after 24h
