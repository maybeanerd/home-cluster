longhorn:
  preUpgradeChecker:
    jobEnabled: false
  defaultSettings:
    defaultDataPath: /data/raid/longhorn
    defaultReplicaCount: '1'
    createDefaultDiskLabeledNodes: true
  persistence:
    defaultClassReplicaCount: 1
  systemManagedComponentsNodeSelector:
    node.longhorn.io/create-default-disk: 'config'
  createDefaultDiskLabeledNodes: true
  longhornUI:
    replicas: 1
  ingress:
    enabled: true
    host: longhorn.cluster.diluz.io
    annotations:
      traefik.ingress.kubernetes.io/router.middlewares: traefik-authentik-admin@kubernetescrd

backups:
  s3:
    endpoint: 'https://fsn1.your-objectstorage.com'
    accessKey: 'TODO_HETZNER_KEY'
    secretKey: 'TODO_HETZNER_SECRET'
