apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-stale-mount-cleanup
  labels:
    app: longhorn-stale-mount-cleanup
spec:
  selector:
    matchLabels:
      app: longhorn-stale-mount-cleanup
  template:
    metadata:
      labels:
        app: longhorn-stale-mount-cleanup
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: cleanup
          image: alpine:3.19
          securityContext:
            privileged: false
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
          env:
            - name: DRY_RUN
              value: "true"
          volumeMounts:
            - name: kubelet-plugins
              mountPath: /host/var/lib/kubelet/plugins/kubernetes.io/csi/driver.longhorn.io
              mountPropagation: HostToContainer
            - name: kubelet-pods
              mountPath: /host/var/lib/kubelet/pods
              mountPropagation: HostToContainer
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              KUBELET_PLUGINS=/host/var/lib/kubelet/plugins/kubernetes.io/csi/driver.longhorn.io
              KUBELET_PODS=/host/var/lib/kubelet/pods

              if [ "$DRY_RUN" = "true" ]; then
                echo "$(date): Running in DRY RUN mode"
              else
                echo "$(date): THIS IS NOT DRY RUN - live unmounts will happen"
              fi

              # --- debug: print hash -> PVC mapping once on startup ---
              echo "$(date): --- Volume hash map ---"
              for hash_dir in "$KUBELET_PLUGINS"/*/; do
                [ -d "$hash_dir" ] || continue
                hash=$(basename "$hash_dir")
                vol_data="${hash_dir}vol_data.json"
                if [ -f "$vol_data" ]; then
                  pvc=$(grep -o '"volumeHandle":"[^"]*"' "$vol_data" 2>/dev/null | cut -d'"' -f4)
                  echo "$(date): $hash -> $pvc"
                else
                  echo "$(date): $hash -> NO vol_data.json"
                fi
              done
              echo "$(date): --- End volume hash map ---"

              while true; do
                echo "$(date): Starting stale mount cleanup pass"
                FOUND=0

                for mountdir in "$KUBELET_PLUGINS"/*/globalmount; do
                  [ -d "$mountdir" ] || continue

                  # only care about dirs that are actually mounted
                  if ! grep -q "$mountdir" /host/proc/mounts; then
                    continue
                  fi

                  hash=$(echo "$mountdir" | awk -F'/' '{print $(NF-1)}')
                  vol_data="$KUBELET_PLUGINS/$hash/vol_data.json"

                  # no vol_data.json means kubelet never finished setup or already cleaned up
                  if [ ! -f "$vol_data" ]; then
                    FOUND=1
                    echo "$(date): No vol_data.json for hash $hash - definitely orphaned"
                    if [ "$DRY_RUN" = "true" ]; then
                      echo "$(date): [DRY RUN] Would unmount stale mount: $mountdir"
                    else
                      echo "$(date): THIS IS NOT DRY RUN - would call umount -l on: $mountdir"
                    fi
                    continue
                  fi

                  # vol_data.json exists - cross-check against active pods
                  pvc=$(grep -o '"volumeHandle":"[^"]*"' "$vol_data" 2>/dev/null | cut -d'"' -f4)
                  if grep -qr "$hash" "$KUBELET_PODS"/*/volumes/kubernetes.io~csi/*/vol_data.json 2>/dev/null; then
                    echo "$(date): Hash $hash ($pvc) referenced by active pod, skipping"
                    continue
                  fi

                  FOUND=1
                  echo "$(date): Hash $hash ($pvc) not referenced by any active pod - stale"
                  if [ "$DRY_RUN" = "true" ]; then
                    echo "$(date): [DRY RUN] Would unmount stale mount: $mountdir"
                  else
                    echo "$(date): THIS IS NOT DRY RUN - would call umount -l on: $mountdir"
                  fi
                done

                if [ "$FOUND" = "0" ]; then
                  echo "$(date): No stale mounts found"
                fi

                echo "$(date): Cleanup pass complete, sleeping 30m"
                sleep 1800
              done
      volumes:
        - name: kubelet-plugins
          hostPath:
            path: /var/lib/kubelet/plugins/kubernetes.io/csi/driver.longhorn.io
        - name: kubelet-pods
          hostPath:
            path: /var/lib/kubelet/pods
        - name: proc
          hostPath:
            path: /proc
