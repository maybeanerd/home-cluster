apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: longhorn-stale-mount-cleanup
  labels:
    app: longhorn-stale-mount-cleanup
spec:
  selector:
    matchLabels:
      app: longhorn-stale-mount-cleanup
  template:
    metadata:
      labels:
        app: longhorn-stale-mount-cleanup
    spec:
      hostPID: true
      tolerations:
        - operator: Exists
      containers:
        - name: cleanup
          image: alpine:3.19
          securityContext:
            privileged: false
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_PTRACE
          env:
            - name: DRY_RUN
              value: "true"
          volumeMounts:
            - name: kubelet-plugins
              mountPath: /host/var/lib/kubelet/plugins/kubernetes.io/csi/driver.longhorn.io
              mountPropagation: HostToContainer
            - name: kubelet-pods
              mountPath: /host/var/lib/kubelet/pods
              mountPropagation: HostToContainer
              readOnly: true
            - name: proc
              mountPath: /host/proc
              readOnly: true
          command:
            - /bin/sh
            - -c
            - |
              KUBELET_PLUGINS=/host/var/lib/kubelet/plugins/kubernetes.io/csi/driver.longhorn.io
              KUBELET_PODS=/host/var/lib/kubelet/pods

              if [ "$DRY_RUN" = "true" ]; then
                echo "$(date): Running in DRY RUN mode"
              else
                echo "$(date): THIS IS NOT DRY RUN - live unmounts will happen"
              fi

              while true; do
                echo "$(date): Starting stale mount cleanup pass"
                FOUND=0

                for mountdir in "$KUBELET_PLUGINS"/*/globalmount; do
                  [ -d "$mountdir" ] || continue

                  # only care about dirs that are actually mounted
                  if ! grep -q "$mountdir" /host/proc/mounts; then
                    continue
                  fi

                  # extract the CSI volume hash
                  hash=$(echo "$mountdir" | awk -F'/' '{print $(NF-1)}')

                  # if any active pod references this hash it's a live volume
                  if grep -qr "$hash" "$KUBELET_PODS"/*/volumes/kubernetes.io~csi/*/vol_data.json 2>/dev/null; then
                    echo "$(date): Hash $hash referenced by active pod, skipping"
                    continue
                  fi

                  FOUND=1
                  if [ "$DRY_RUN" = "true" ]; then
                    echo "$(date): [DRY RUN] Would unmount stale mount: $mountdir"
                  else
                    echo "$(date): THIS IS NOT DRY RUN - would call umount -l on: $mountdir"
                  fi
                done

                if [ "$FOUND" = "0" ]; then
                  echo "$(date): No stale mounts found"
                fi

                echo "$(date): Cleanup pass complete, sleeping 30m"
                sleep 1800
              done
      volumes:
        - name: kubelet-plugins
          hostPath:
            path: /var/lib/kubelet/plugins/kubernetes.io/csi/driver.longhorn.io
        - name: kubelet-pods
          hostPath:
            path: /var/lib/kubelet/pods
        - name: proc
          hostPath:
            path: /proc
