# yaml-language-server: $schema=values.schema.json

traefik:
  # enable traefik dashboard
  ingressRoute:
    dashboard:
      enabled: true
      matchRule: Host(`traefik.cluster.diluz.io`)
      entryPoints: ['websecure']
      middlewares:
        - name: authentik-admin
  extraObjects:
    - apiVersion: v1
      kind: Service
      metadata:
        name: traefik-dashboard
      spec:
        type: NodePort
        selector:
          app.kubernetes.io/name: traefik
          app.kubernetes.io/instance: traefik-traefik
        ports:
          - port: 8080
            name: traefik
            targetPort: 8080
            protocol: TCP
            nodePort: 32080
    - apiVersion: traefik.io/v1alpha1
      kind: Middleware
      metadata:
        name: authentik-admin
        # TODO make this actually validate for being an admin user, currently it just checks for any valid user
      spec:
        forwardAuth:
          # This address should point to the cluster endpoint provided by the kubernetes service, not the Ingress.
          address: http://authentik-server.authentik.svc.cluster.local/outpost.goauthentik.io/auth/traefik
          trustForwardHeader: true
          authResponseHeaders:
            - X-authentik-username
            - X-authentik-groups
            - X-authentik-entitlements
            # - X-authentik-email
            # - X-authentik-name
            # - X-authentik-uid
            # - X-authentik-jwt
            # - X-authentik-meta-jwks
            # - X-authentik-meta-outpost
            # - X-authentik-meta-provider
            # - X-authentik-meta-app
            # - X-authentik-meta-version
  # always redirect http to https
  ports:
    web:
      http:
        redirections:
          entryPoint:
            to: websecure
            scheme: https
            permanent: true
  # enable ingressClass to let Traefik be default ingress controller
  ingressClass:
    name: traefik
  providers:
    kubernetesCRD:
      ingressClass: traefik
      allowCrossNamespace: true
    kubernetesIngress:
      ingressClass: traefik
  # ACME/Let's Encrypt configuration with HTTP challenge
  additionalArguments:
    - --certificatesresolvers.production.acme.email=cluster@diluz.io
    - --certificatesresolvers.production.acme.caServer=https://acme-v02.api.letsencrypt.org/directory
    - --certificatesresolvers.production.acme.httpChallenge.entryPoint=web
    - --certificatesresolvers.production.acme.storage=/ssl-certs/acme-production.json
    # Set production as default cert resolver for all TLS connections
    - --entrypoints.websecure.http.tls.certresolver=production
  # Persist certificates
  persistence:
    enabled: true
    name: ssl-certs
    storageClass: longhorn
    accessMode: ReadWriteOnce
    size: 1Gi
    path: /ssl-certs
  # Fix ACME file permissions (must be 0600 for ACME JSON)
  # As described in https://github.com/traefik/traefik-helm-chart/blob/master/EXAMPLES.md#use-traefik-native-lets-encrypt-integration-without-cert-manager
  deployment:
    initContainers:
      - name: volume-permissions
        image: busybox:latest
        command:
          [
            'sh',
            '-c',
            'touch /ssl-certs/acme-production.json; chmod -v 600 /ssl-certs/acme-production.json',
          ]
        volumeMounts:
          - mountPath: /ssl-certs
            name: ssl-certs
  podSecurityContext:
    fsGroup: 65532
    fsGroupChangePolicy: 'OnRootMismatch'
  affinity:
    # Prefer worker nodes
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 1
          preference:
            matchExpressions:
              - key: kubernetes.io/role
                operator: In
                values:
                  - worker
    # keep all pods on the same node (for RWO volumes)
    podAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - weight: 100
          podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - traefik
            topologyKey: kubernetes.io/hostname
