app-template:
  controllers:
    pds:
      type: deployment
      replicas: 1

      containers:
        app:
          image:
            repository: ghcr.io/bluesky-social/pds
            tag: 0.4.5009

          env:
            PDS_HOSTNAME: "bumsco.de"
            PDS_DATA_DIRECTORY: "/pds"
            PDS_BLOBSTORE_DISK_LOCATION: "/pds/blocks"

            PDS_CONTACT_EMAIL_ADDRESS: "pds@diluz.io"
            PDS_EMAIL_SMTP_URL: "smtps://YOUR_SMTP_USERNAME:YOUR_SMTP_PASSWORD@YOUR_SMTP_HOST:465/"
            PDS_EMAIL_FROM_ADDRESS: "noreply@bumsco.de"
            PDS_INVITE_REQUIRED: "true"

            PDS_JWT_SECRET: "TODOCHANGEME"
            PDS_ADMIN_PASSWORD: "TODOCHANGEME"
            PDS_PLC_ROTATION_KEY_K256_PRIVATE_KEY_HEX: "TODOCHANGEME"

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /xrpc/_health
                  port: 3000
                initialDelaySeconds: 10
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /xrpc/_health
                  port: 3000
                periodSeconds: 15
                timeoutSeconds: 5
            startup:
              enabled: true
              custom: true
              spec:
                httpGet:
                  path: /xrpc/_health
                  port: 3000
                periodSeconds: 5
                failureThreshold: 30

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

  service:
    app:
      controller: pds
      ports:
        http:
          port: 3000

  ingress:
    app:
      hosts:
        - host: "bumsco.de"
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
                port: http
        - host: "maybeanerd.bumsco.de"
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
                port: http

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      size: 20Gi
      accessMode: ReadWriteOnce
      storageClass: "longhorn"
      globalMounts:
        - path: /pds
