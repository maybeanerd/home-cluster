cnpg-cluster:
  fullnameOverride: "cnpg"
  cluster:
    instances: 1
    storage:
      size: "10Gi"
      storageClass: "longhorn"

imageCredentials:
  registry: atcr.io
  username: "maybeanerd.bsky.social"
  password: "TODOCHANGEME"

app-template:
  controllers:
    tranquil-pds:
      type: deployment
      replicas: 1

      pod:
        imagePullSecrets:
          - name: imagepullsecret
      containers:
        app:
          image:
            repository: atcr.io/tranquil.farm/tranquil-pds
            tag: v0.6.5

          env:
            # https://tangled.org/tranquil.farm/tranquil-pds/blob/main/example.toml
            SERVER_HOST: "0.0.0.0"
            PDS_HOSTNAME: "pds.cluster.diluz.io"
            PDS_AGE_ASSURANCE_OVERRIDE: "true"
            FRONTEND_ENABLED: "true"
            TRUSTED_PROXY_COUNT: 2
            INVITE_CODE_REQUIRED: "true"
            REPO_BACKEND: "postgres"
            BLOB_STORAGE_BACKEND: "filesystem"
            BLOB_STORAGE_PATH: "/var/lib/tranquil-pds/blobs"
            CONTACT_EMAIL: "pds@diluz.io"

            DATABASE_URL:
              valueFrom:
                secretKeyRef:
                  name: cnpg-app
                  key: uri

            JWT_SECRET: ""
            DPOP_SECRET: ""
            MASTER_KEY: ""
            PLC_ROTATION_KEY: ""

            PDS_USER_HANDLE_DOMAINS: "diluz.io"

            SSO_OIDC_ENABLED: "true"
            SSO_OIDC_ISSUER: "TODO"
            SSO_OIDC_DISPLAY_NAME: "Authentik"
            SSO_OIDC_CLIENT_ID: "TODOCHANGEME"
            SSO_OIDC_CLIENT_SECRET: "TODOCHANGEME"

          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                exec:
                  command: ["/usr/local/bin/tranquil-pds", "healthcheck"]
                initialDelaySeconds: 10
                periodSeconds: 30
                timeoutSeconds: 10
                failureThreshold: 3
            readiness:
              enabled: true
              custom: true
              spec:
                exec:
                  command: ["/usr/local/bin/tranquil-pds", "healthcheck"]
                periodSeconds: 15
                timeoutSeconds: 5
            startup:
              enabled: true
              custom: true
              spec:
                exec:
                  command: ["/usr/local/bin/tranquil-pds", "healthcheck"]
                periodSeconds: 5
                failureThreshold: 30

          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi

  service:
    app:
      controller: tranquil-pds
      ports:
        http:
          port: 3000

  ingress:
    app:
      hosts:
        - host: "pds.cluster.diluz.io"
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: app
                port: http

  persistence:
    blobs:
      enabled: true
      type: persistentVolumeClaim
      size: 20Gi
      accessMode: ReadWriteOnce
      storageClass: "longhorn"
      globalMounts:
        - path: /var/lib/tranquil-pds/blobs
