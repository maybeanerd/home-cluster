authentik:
  global:
    affinity:
      nodeAffinity:
        # -- Default node affinity rules. Either `none`, `soft` or `hard`
        type: soft
        matchExpressions:
          - key: kubernetes.io/role
            operator: In
            values:
              - worker
  authentik:
    secret_key: "PleaseGenerateA50CharKey"
    # This sends anonymous usage-data, stack traces on errors and
    # performance data to sentry.io, and is fully opt-in
    error_reporting:
      enabled: true
    postgresql:
      password: "ThisIsNotASecurePassword"
    email:
      # -- SMTP Server emails are sent from, fully optional
      host: "smtp.servivum.com"
      # -- SMTP server port
      port: 587
      # -- SMTP credentials, when left empty, no authentication will be done
      username: "noreply@diluzio.dev"
      # -- SMTP credentials, when left empty, no authentication will be done
      password: "TODO_EMAIL_PASSWORD"
      # -- Enable either use_tls or use_ssl, they can't be enabled at the same time.
      use_tls: true
      # -- Enable either use_tls or use_ssl, they can't be enabled at the same time.
      use_ssl: false
      # -- Connection timeout
      timeout: 30
      # -- Email from address, can either be in the format "foo@bar.baz" or "authentik <foo@bar.baz>"
      from: "auth.cluster.diluz.io <noreply@diluzio.dev>"
    server:
      resources:
        requests:
          cpu: 200m
          memory: 128Mi
    worker:
      resources:
        requests:
          cpu: 100m
          memory: 128Mi

  server:
    ingress:
      enabled: true
      hosts:
        - auth.cluster.diluz.io

  postgresql:
    enabled: true
    auth:
      # TODO override in consumer (e.g. in argoCD directly)
      password: "ThisIsNotASecurePassword"
    primary:
      persistence:
        enabled: true
        existingClaim: "data-authentik-postgresql-longhorn"
      startupProbe:
        enabled: true
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              preference:
                matchExpressions:
                  - key: kubernetes.io/role
                    operator: In
                    values:
                      - worker
  redis:
    enabled: true
    # temporarily override image since old ones were deleted
    image:
      registry: docker.io
      repository: bitnami/redis
      tag: latest
    master:
      persistence:
        enabled: false

pvc-migration:
  enabled: true
  migrations:
    - sourcePvc: data-authentik-postgresql-0
      destPvc: data-authentik-postgresql-longhorn
